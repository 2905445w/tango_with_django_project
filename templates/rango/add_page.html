<!DOCTYPE html>
<html>
<head>
    <title>Add Page</title>
</head>
<body>
    <h1>Add a Page to {{ category.name }}</h1>
    <form id="page_form" method="post" action="{% url 'rango:add_page' category_name_slug=category.slug %}">
        {% csrf_token %}
        {{ form.as_p }}

        <input type="submit" value="Add Page" />
    </form>

    <a href="{% url 'rango:show_category' category_name_slug=category.slug %}">Back to {{ category.name }}</a>

</body>
</html>
